<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Temp Monitor</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #ccc;
      font-family: Consolas, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 32px;
      padding: 32px 16px;
    }
    h1 { font-size: 14px; color: #444; letter-spacing: 3px; text-transform: uppercase; }
    .cards {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card {
      background: #111;
      border-radius: 12px;
      padding: 36px 48px;
      text-align: center;
      min-width: 180px;
    }
    .label { font-size: 11px; color: #555; letter-spacing: 2px; margin-bottom: 12px; }
    .value { font-size: 56px; font-weight: bold; }
    .comfort { font-size: 12px; color: #444; margin-top: 8px; }
    #status { font-size: 11px; color: #555; }

    .control-card {
      background: #111;
      border-radius: 12px;
      padding: 28px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .control-title { font-size: 11px; color: #555; letter-spacing: 2px; }

    .led-btn {
      background: #1e1e1e;
      color: #555;
      border: 2px solid #333;
      border-radius: 50%;
      width: 80px;
      height: 80px;
      font-size: 32px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .led-btn.on {
      background: #1a2a1a;
      border-color: #00ff88;
      color: #00ff88;
      box-shadow: 0 0 18px #00ff8866;
    }
    .servo-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .servo-btn {
      background: #1e1e1e;
      color: #888;
      border: none;
      border-radius: 8px;
      width: 64px;
      height: 52px;
      font-size: 22px;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .servo-btn:active { background: #00aaff; color: #000; }
    .servo-label { font-size: 10px; color: #444; letter-spacing: 1px; }
    #mqtt-status { font-size: 10px; color: #333; }
    .footer { font-size: 11px; color: #333; }
  </style>
</head>
<body>
  <h1>DHT11 Live Monitor</h1>

  <div class="cards">
    <div class="card">
      <div class="label">TEMPERATURE</div>
      <div class="value" id="temp">--</div>
      <div class="comfort" id="temp-comfort"></div>
    </div>
    <div class="card">
      <div class="label">HUMIDITY</div>
      <div class="value" id="humi">--</div>
      <div class="comfort" id="humi-comfort"></div>
    </div>
  </div>
  <div id="status">connecting...</div>

  <div class="control-card">
    <div class="control-title">ESP32 CONTROL</div>
    <div class="servo-label">LED</div>
    <button class="led-btn" id="led-btn" title="Toggle LED">&#9679;</button>
    <div class="servo-label">SERVO</div>
    <div class="servo-row">
      <button class="servo-btn" id="btn-l">&#9664;</button>
      <button class="servo-btn" id="btn-r">&#9654;</button>
    </div>
    <div id="mqtt-status">disconnected</div>
  </div>

  <div class="footer">sensor updates every 15 s</div>

  <script>
    const CHANNEL     = "3388449";
    const TOPIC_LED   = "tgt/led/stefankochtgt/cmd";
    const TOPIC_SERVO = "tgt/servo/stefankochtgt/cmd";

    function tempColor(t) {
      if (t < 18) return "#00aaff";
      if (t < 26) return "#00ff88";
      if (t < 35) return "#ffaa00";
      return "#ff3300";
    }
    function humiColor(h) {
      if (h < 30) return "#ffaa00";
      if (h < 60) return "#00ff88";
      return "#00aaff";
    }
    function tempLabel(t) {
      if (t < 18) return "cold";
      if (t < 26) return "comfortable";
      if (t < 35) return "warm";
      return "hot";
    }
    function humiLabel(h) {
      if (h < 30) return "dry";
      if (h < 60) return "comfortable";
      return "humid";
    }

    async function updateSensor() {
      try {
        const r = await fetch(
          `https://api.thingspeak.com/channels/${CHANNEL}/feeds/last.json`
        );
        const d = await r.json();
        const t = parseFloat(d.field1);
        const h = parseFloat(d.field2);
        document.getElementById("temp").textContent = t.toFixed(1) + " °C";
        document.getElementById("temp").style.color = tempColor(t);
        document.getElementById("temp-comfort").textContent = tempLabel(t);
        document.getElementById("humi").textContent = h.toFixed(1) + " %";
        document.getElementById("humi").style.color = humiColor(h);
        document.getElementById("humi-comfort").textContent = humiLabel(h);
        const ts = new Date(d.created_at).toLocaleTimeString();
        document.getElementById("status").textContent = "last reading: " + ts;
      } catch (e) {
        document.getElementById("status").textContent = "error fetching data";
      }
    }
    updateSensor();
    setInterval(updateSensor, 15000);

    const mqttStatus = document.getElementById("mqtt-status");
    const ledBtn     = document.getElementById("led-btn");
    let ledOn = false;

    const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

    client.on("connect", () => {
      mqttStatus.textContent = "connected";
      mqttStatus.style.color = "#00ff88";
    });
    client.on("error", () => {
      mqttStatus.textContent = "error";
      mqttStatus.style.color = "#ff3300";
    });
    client.on("offline", () => {
      mqttStatus.textContent = "disconnected";
      mqttStatus.style.color = "#555";
    });

    ledBtn.addEventListener("click", () => {
      client.publish(TOPIC_LED, "T");
      ledOn = !ledOn;
      ledBtn.classList.toggle("on", ledOn);
    });

    let servoInterval = null;

    function startServo(cmd) {
      if (servoInterval) return;
      client.publish(TOPIC_SERVO, cmd);
      servoInterval = setInterval(() => client.publish(TOPIC_SERVO, cmd), 150);
    }
    function stopServo() {
      clearInterval(servoInterval);
      servoInterval = null;
    }

    document.getElementById("btn-l").addEventListener("pointerdown", (e) => { e.preventDefault(); startServo("L"); });
    document.getElementById("btn-r").addEventListener("pointerdown", (e) => { e.preventDefault(); startServo("R"); });
    document.addEventListener("pointerup", stopServo);
    document.addEventListener("pointercancel", stopServo);
  </script>
</body>
</html>
